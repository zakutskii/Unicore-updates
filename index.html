<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Unicore Updates</title>
    <meta name="description" content="Live changelog for Unicore releases." />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="hero">
        <p class="eyebrow">Unicore</p>
        <h1>Release Updates</h1>
      </header>

      <section class="panel">
        <div class="panel-head">
          <h2>Changelog</h2>
          <span id="status">Loading...</span>
        </div>
        <div id="releases" class="releases"></div>
      </section>
    </main>

    <template id="release-template">
      <article class="release">
        <h3><a class="release-link" target="_blank" rel="noreferrer"></a></h3>
        <p class="meta"></p>
        <div class="notes markdown"></div>
      </article>
    </template>

    <script src="app.js" defer></script>
  </body>
</html>
